<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Little World ❤️</title>

    <link rel="stylesheet" href="styles/style.css">

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.min.js"></script>

    <!-- GLTF Loader -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.165.0/examples/js/loaders/GLTFLoader.js"></script>
</head>

<body>

    <!-- Loading Screen -->
    <div id="loading">
        <h1>❤️ Our Little World ❤️</h1>
        <p>Loading...</p>
    </div>

    <!-- Game Canvas -->
    <canvas id="game"></canvas>

    <!-- UI -->
    <div id="ui">

        <button id="hugBtn">🤗 Hug</button>

        <button id="sitBtn">🪑 Sit</button>

        <button id="sleepBtn">🛏 Sleep</button>

        <button id="followBtn">🚶 Follow</button>

        <button id="menuBtn">⚙️ Menu</button>

    </div>

    <script type="module" src="scripts/main.js"></script>

</body>

</html>
